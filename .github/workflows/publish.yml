name: Publish to npm

# Publishes the package whenever a GitHub Release is published.
# Auth is via npm trusted publishing (OIDC) — no NPM_TOKEN secret required.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing requires a recent npm. setup-node ships an older one,
      # so upgrade to a version that supports OIDC.
      - run: npm install -g npm@latest

      # The "prepack" script regenerates src/mega-names.generated.js by lexing the
      # @servicenow/* packages (via es-module-lexer, resolved through vite), so the
      # dependencies must be installed before npm publish runs prepack.
      - run: npm ci

      - run: npm publish